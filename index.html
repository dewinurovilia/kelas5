<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nilai Siswa Kelas 5</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#f4f7fb;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:20px;
}

.select-box{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

select{
    width:100%;
    padding:12px;
    border:2px solid #1565c0;
    border-radius:10px;
    font-size:16px;
}

.info{
    background:#e3f2fd;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:18px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1565c0;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f8fbff;
}

.rata-rata{
    margin-top:15px;
    background:#e8f5e9;
    padding:15px;
    border-radius:10px;
    text-align:right;
    font-size:22px;
    font-weight:bold;
    color:#2e7d32;
}
</style>
</head>
<body>

<div class="container">

<h1>📚 NILAI SISWA KELAS 5</h1>

<div class="select-box">
    <label>Pilih Nama Siswa</label>
    <select id="namaSiswa"></select>
</div>

<div class="info">
    <b>Kelas :</b> <span id="kelas"></span>
</div>

<table>
    <thead>
        <tr>
            <th>No</th>
            <th>Mata Pelajaran</th>
            <th>Nilai</th>
        </tr>
    </thead>
    <tbody id="tabelNilai"></tbody>
</table>

<div class="rata-rata">
    Rata-rata : <span id="rata">0</span>
</div>

</div>

<script>

const siswa = {

"AZKA BRIYAN LEO RIDWAN":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":58.90,
"Matematika":79.4
}
},

"DAWIATU SHOLIKHAH":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":68.40,
"Matematika":64.7
}
},

"MOH. ADIT IYAN":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":57.90,
"Matematika":39.7
}
},

"MOH. FARHAN RHOMADHONI":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":46.30,
"Matematika":45.6
}
},

"MUHAMMAD DWI PUJI WIJAYANTO":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":60.50,
"Matematika":65.4
}
},

"MUHAMMAD DYNAR SETIAWAN":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":47.20,
"Matematika":49.2
}
},

"MUHAMMAD IRHAM MUSTAQIM":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":49.40,
"Matematika":41.2
}
},

"NESYA SEPTIA DEWI ARISTA":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":77.40,
"Matematika":55.9
}
},

"NIA NUR ANISSA FIRDAUS AHMAD RUKI":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":73.70,
"Matematika":73.5
}
},

"RISMA AYU FEBRIANTI":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":57.70,
"Matematika":61.4
}
},

"UFAIRA ZAHWA AZYANI":{
kelas:"V",
nilai:{
"Pendidikan Pancasila":68.40,
"Matematika":63.3
}
}

};

const select = document.getElementById("namaSiswa");

Object.keys(siswa).forEach(nama=>{
    select.innerHTML += `<option value="${nama}">${nama}</option>`;
});

function tampilkanData(){

    const data = siswa[select.value];

    document.getElementById("kelas").textContent = data.kelas;

    const tbody = document.getElementById("tabelNilai");
    tbody.innerHTML = "";

    let total = 0;
    let no = 1;

    for(let mapel in data.nilai){

        total += data.nilai[mapel];

        tbody.innerHTML += `
        <tr>
            <td>${no++}</td>
            <td>${mapel}</td>
            <td>${data.nilai[mapel]}</td>
        </tr>
        `;
    }

    document.getElementById("rata").textContent =
        (total / Object.keys(data.nilai).length).toFixed(2);
}

select.addEventListener("change", tampilkanData);

tampilkanData();

</script>

</body>
</html>
