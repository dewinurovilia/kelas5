<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Nilai</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Input Nilai Siswa Kelas 5</h2>

<form id="formNilai">

<input type="text" id="nama" placeholder="Nama Siswa" required>

<select id="kelas">
<option>5</option>
</select>

<input type="number" id="agama" placeholder="Agama">
<input type="number" id="indo" placeholder="Bahasa Indonesia">
<input type="number" id="mtk" placeholder="Matematika">
<input type="number" id="ipas" placeholder="IPAS">
<input type="number" id="pp" placeholder="Pendidikan Pancasila">
<input type="number" id="pjok" placeholder="PJOK">
<input type="number" id="seni" placeholder="Seni Budaya">
<input type="number" id="bing" placeholder="Bahasa Inggris">

<button type="submit">
Simpan Nilai
</button>

</form>

</div>
<script type="module" src="script.js"></script>

</body>
</html>
